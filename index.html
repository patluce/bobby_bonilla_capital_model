<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bobby Bonilla Day: One Deal, Every Discount Rate</title>
<style>
  html, body { margin: 0; padding: 0; background: #F0F2EC; }
  #root { min-height: 100vh; }
  .dl-bar { max-width: 960px; margin: 0 auto; padding: 4px clamp(20px,4vw,44px) 48px;
            font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace; }
  .dl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px;
            border: 1.5px solid #16241D; border-radius: 9px; color: #16241D;
            background: #FBFCF9; text-decoration: none; font-size: 13px; font-weight: 600; }
  .dl-btn:hover { background: #16241D; color: #F0F2EC; }
  .dl-note { font-size: 11.5px; color: #5C6B60; margin-top: 8px; }
</style>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<div class="dl-bar">
  <a class="dl-btn" href="./bobby-bonilla-model.xlsx" download>&#8595;&nbsp; Download the Excel model</a>
  <div class="dl-note">Same math as the tool above, with live formulas you can change. Works in Excel, Numbers, or Google Sheets.</div>
</div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const { AreaChart, Area, XAxis, YAxis, ReferenceLine, ResponsiveContainer, Tooltip, CartesianGrid } = Recharts;


/* ------------------------------------------------------------------ *
 *  Bobby Bonilla Day: one deal, every discount rate
 *  A reader-facing net-present-value tool.
 *  Math validated against published anchors:
 *    r = 8%  -> PV(2000) = $5,900,000, ending 2035 balance = $0 (fair)
 *    r = 10% -> ending 2035 balance = $48.5M
 *    nominal total paid = $29,831,205
 * ------------------------------------------------------------------ */

const C = {
  ink:      "#16241D",
  field:    "#1E5C3F",
  fieldDeep:"#123D2A",
  fieldSoft:"#E4EDE4",
  paper:    "#F0F2EC",
  card:     "#FBFCF9",
  line:     "#CDD6C9",
  clay:     "#B23A2E",
  claySoft: "#F4E2DF",
  brass:    "#A9822F",
  brassSoft:"#F0E7CF",
  muted:    "#5C6B60",
};

const FONT_DISPLAY = "'Fraunces', Georgia, 'Times New Roman', serif";
const FONT_MONO = "'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace";
const FONT_BODY = "'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif";

const PAYMENT = 1193248.2;
const OWED = 5_900_000;
const FIRST = 2011;
const LAST = 2035;
const BASE = 2000;
const NOMINAL = PAYMENT * 25;

/* ---------- formatters ---------- */
const fUSD0 = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const fUSD2 = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });
const money0 = (n) => (Number.isFinite(n) ? fUSD0.format(n) : "n/a");
const money2 = (n) => (Number.isFinite(n) ? fUSD2.format(n) : "n/a");
const pct1 = (n) => (Number.isFinite(n) ? `${(n * 100).toFixed(1)}%` : "n/a");

/* ---------- financial math ---------- */
function pv2000(r) {
  let pv = 0;
  for (let y = FIRST; y <= LAST; y++) pv += PAYMENT / Math.pow(1 + r, y - BASE);
  return pv;
}
function fundSeries(r) {
  let bal = OWED;
  const out = [{ year: BASE, balance: bal }];
  for (let y = BASE + 1; y <= LAST; y++) {
    bal = bal * (1 + r) - (y >= FIRST && y <= LAST ? PAYMENT : 0);
    out.push({ year: y, balance: Math.round(bal) });
  }
  return out;
}
function pvStream(r, pmt, n, defer) {
  let s = 0;
  for (let k = 0; k < n; k++) s += pmt / Math.pow(1 + r, defer + k);
  return s;
}
function solveIRR(lump, pmt, n, defer) {
  const f = (r) => pvStream(r, pmt, n, defer) - lump;
  let lo = -0.9, hi = 3.0;
  if (f(lo) * f(hi) > 0) return null;
  for (let i = 0; i < 240; i++) {
    const m = (lo + hi) / 2;
    if (f(m) > 0) lo = m;
    else hi = m;
  }
  return (lo + hi) / 2;
}

const REDUCED_MOTION =
  typeof window !== "undefined" &&
  window.matchMedia &&
  window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ================================================================== */

function App() {
  const [tab, setTab] = useState("bobby");

  return (
    <div style={{ background: C.paper, color: C.ink, fontFamily: FONT_BODY, minHeight: "100%" }}>
      <style>{styleBlock}</style>

      <div className="mx-auto" style={{ maxWidth: 960, padding: "clamp(20px, 4vw, 44px)" }}>
        {/* header */}
        <div style={{ borderBottom: `2px solid ${C.ink}`, paddingBottom: 20, marginBottom: 24 }}>
          <div
            style={{
              fontFamily: FONT_MONO, fontSize: 12, letterSpacing: "0.22em",
              textTransform: "uppercase", color: C.field, fontWeight: 600,
            }}
          >
            Net present value · Bobby Bonilla Day
          </div>
          <h1
            style={{
              fontFamily: FONT_DISPLAY, fontWeight: 600, lineHeight: 1.02,
              fontSize: "clamp(30px, 6vw, 52px)", margin: "10px 0 0", letterSpacing: "-0.01em",
            }}
          >
            One deal, every discount rate
          </h1>
          <p style={{ maxWidth: 640, marginTop: 14, fontSize: 16, lineHeight: 1.55, color: C.ink }}>
            The Mets owed Bobby Bonilla <Num>{money0(OWED)}</Num> in 2000. They chose to pay{" "}
            <Num>{money0(NOMINAL)}</Num> instead. Whether that was brilliant or foolish comes down to a
            single number: what they could earn on the cash they kept. Move it and watch.
          </p>
        </div>

        {/* tabs */}
        <div role="tablist" aria-label="Calculator views" style={{ display: "flex", gap: 4, marginBottom: 24 }}>
          <TabButton active={tab === "bobby"} onClick={() => setTab("bobby")} id="tab-bobby">
            Bobby&rsquo;s ledger
          </TabButton>
          <TabButton active={tab === "own"} onClick={() => setTab("own")} id="tab-own">
            Run your own offer
          </TabButton>
        </div>

        {tab === "bobby" ? <BobbyTab /> : <OwnTab />}

        <footer
          style={{
            marginTop: 34, paddingTop: 16, borderTop: `1px solid ${C.line}`,
            fontFamily: FONT_MONO, fontSize: 11.5, color: C.muted, lineHeight: 1.7,
          }}
        >
          Educational, not financial advice. Bobby&rsquo;s math: {money2(PAYMENT)} × 25 = {money0(NOMINAL)},
          an 8% return on {money0(OWED)} deferred from 2000 and paid every July 1 from 2011 through 2035.
        </footer>
      </div>
    </div>
  );
}

/* ============================ TAB 1 ============================== */

function BobbyTab() {
  const [rate, setRate] = useState(0.08);
  const [infl, setInfl] = useState(0.025);

  const series = useMemo(() => fundSeries(rate), [rate]);
  const pv = useMemo(() => pv2000(rate), [rate]);
  const ending = series[series.length - 1].balance;
  const net = OWED - pv; // positive => deferring helped the Mets
  const positive = ending >= 0;
  const verdictColor = Math.abs(net) < 25_000 ? C.brass : positive ? C.field : C.clay;

  // real-value (purchasing power) figures, base year = 2011 when checks began
  const finalReal = PAYMENT / Math.pow(1 + infl, LAST - FIRST);
  let totalReal = 0;
  for (let y = FIRST; y <= LAST; y++) totalReal += PAYMENT / Math.pow(1 + infl, y - FIRST);

  return (
    <div role="tabpanel" aria-labelledby="tab-bobby">
      <div className="grid grid-cols-1" style={{ gap: 16, gridTemplateColumns: "minmax(0,1fr)" }}>
        <div className="rw-two">
          {/* control + verdict */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Card>
              <Eyebrow>The lever</Eyebrow>
              <div style={{ fontSize: 14.5, lineHeight: 1.4, marginBottom: 14, color: C.ink }}>
                What the Mets could earn each year on the cash they kept
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 14 }}>
                <span style={{ fontFamily: FONT_MONO, fontSize: 46, fontWeight: 600, color: C.field, lineHeight: 1 }}>
                  {(rate * 100).toFixed(2)}
                </span>
                <span style={{ fontFamily: FONT_MONO, fontSize: 22, color: C.field }}>%</span>
              </div>
              <input
                className="rw-range"
                type="range" min={0} max={0.15} step={0.0025} value={rate}
                onChange={(e) => setRate(parseFloat(e.target.value))}
                aria-label="Annual return the Mets could earn on kept cash"
              />
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 14 }}>
                <Chip onClick={() => setRate(0.05)} active={approx(rate, 0.05)}>~5% Treasuries</Chip>
                <Chip onClick={() => setRate(0.08)} active={approx(rate, 0.08)}>8% the deal</Chip>
                <Chip onClick={() => setRate(0.1)} active={approx(rate, 0.1)}>10% Madoff fantasy</Chip>
              </div>
            </Card>

            <Card accent={verdictColor}>
              <Eyebrow>The verdict</Eyebrow>
              {Math.abs(net) < 25_000 ? (
                <>
                  <div style={verdictBig(C.brass)}>A wash</div>
                  <p style={verdictText}>
                    At 8% the deal is exactly fair. Deferring neither helped nor hurt; the{" "}
                    {money0(NOMINAL)} headline is simply {money0(OWED)} compounded at the rate they agreed to pay.
                  </p>
                </>
              ) : positive ? (
                <>
                  <div style={verdictBig(C.field)}>Deferring won</div>
                  <p style={verdictText}>
                    Earning more than 8%, the Mets came out ahead by about{" "}
                    <b style={{ color: C.field }}>{money0(net)}</b> in 2000 dollars. They kept {money0(OWED)},
                    grew it faster than the 8% they owed, and pocketed the spread.
                  </p>
                </>
              ) : (
                <>
                  <div style={verdictBig(C.clay)}>Deferring lost</div>
                  <p style={verdictText}>
                    Earning less than 8%, deferring cost the Mets about{" "}
                    <b style={{ color: C.clay }}>{money0(-net)}</b> in 2000 dollars. Paying Bobby up front would
                    have been cheaper than the 8% they promised him.
                  </p>
                </>
              )}
            </Card>
          </div>

          {/* chart */}
          <Card>
            <Eyebrow>The fund that pays Bobby</Eyebrow>
            <div style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.45, marginBottom: 8 }}>
              {money0(OWED)} invested at {(rate * 100).toFixed(2)}%, minus a {money0(PAYMENT)} check every July
              from 2011 to 2035. Where it lands in 2035 is the Mets&rsquo; profit or shortfall.
            </div>
            <div style={{ width: "100%", height: 258 }}>
              <ResponsiveContainer>
                <AreaChart data={series} margin={{ top: 8, right: 6, left: -6, bottom: 0 }}>
                  <defs>
                    <linearGradient id="fundFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={positive ? C.field : C.clay} stopOpacity={0.34} />
                      <stop offset="100%" stopColor={positive ? C.field : C.clay} stopOpacity={0.03} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid stroke={C.line} strokeDasharray="2 4" vertical={false} />
                  <XAxis
                    dataKey="year" type="number" domain={[BASE, LAST]}
                    ticks={[2000, 2005, 2010, 2015, 2020, 2025, 2030, 2035]}
                    tick={{ fontFamily: FONT_MONO, fontSize: 11, fill: C.muted }}
                    stroke={C.line}
                  />
                  <YAxis
                    tickFormatter={(v) => `${v < 0 ? "-" : ""}$${Math.abs(v / 1e6).toFixed(0)}M`}
                    tick={{ fontFamily: FONT_MONO, fontSize: 11, fill: C.muted }}
                    stroke={C.line} width={54}
                  />
                  <Tooltip
                    formatter={(v) => [money0(v), "Fund balance"]}
                    labelFormatter={(l) => `July ${l}`}
                    contentStyle={{
                      fontFamily: FONT_MONO, fontSize: 12, border: `1px solid ${C.ink}`,
                      borderRadius: 8, background: C.card, color: C.ink,
                    }}
                  />
                  <ReferenceLine y={0} stroke={C.ink} strokeWidth={1.4} />
                  <ReferenceLine
                    x={FIRST} stroke={C.brass} strokeDasharray="4 4"
                    label={{ value: "payouts begin", position: "insideTopLeft", fontFamily: FONT_MONO, fontSize: 10, fill: C.brass }}
                  />
                  <Area
                    type="monotone" dataKey="balance" stroke={positive ? C.field : C.clay}
                    strokeWidth={2.4} fill="url(#fundFill)" isAnimationActive={!REDUCED_MOTION}
                    animationDuration={450}
                  />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </Card>
        </div>

        {/* ledger strip */}
        <Card pad={0}>
          <div className="rw-ledger">
            <LedgerCell label="Nominal paid, 2011–2035" value={money0(NOMINAL)} />
            <LedgerCell label={`Present value in 2000 at ${(rate * 100).toFixed(2)}%`} value={money0(pv)} strong />
            <LedgerCell label="What they owed in 2000" value={money0(OWED)} />
            <LedgerCell
              label="Fund balance in 2035"
              value={`${ending < 0 ? "-" : ""}${money0(Math.abs(ending))}`}
              color={positive ? C.field : C.clay}
              last
            />
          </div>
        </Card>

        {/* real value card */}
        <Card>
          <Eyebrow>The second discount: inflation</Eyebrow>
          <div className="rw-real">
            <div style={{ minWidth: 210, flex: "1 1 210px" }}>
              <div style={{ fontSize: 13.5, color: C.ink, lineHeight: 1.45, marginBottom: 12 }}>
                Nominal dollars flatter the payout. A check for {money0(PAYMENT)} in 2035 does not buy what it
                did when the checks began in 2011.
              </div>
              <div style={{ fontFamily: FONT_MONO, fontSize: 13, color: C.field, marginBottom: 6 }}>
                inflation assumption
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 10 }}>
                <span style={{ fontFamily: FONT_MONO, fontSize: 28, fontWeight: 600, color: C.ink }}>
                  {(infl * 100).toFixed(1)}
                </span>
                <span style={{ fontFamily: FONT_MONO, fontSize: 15, color: C.muted }}>% / yr</span>
              </div>
              <input
                className="rw-range rw-range--brass"
                type="range" min={0} max={0.06} step={0.0025} value={infl}
                onChange={(e) => setInfl(parseFloat(e.target.value))}
                aria-label="Annual inflation assumption"
              />
            </div>
            <div style={{ flex: "1 1 240px", display: "flex", flexDirection: "column", gap: 10 }}>
              <RealStat
                head={`The final 2035 check, in 2011 money`}
                value={money0(finalReal)}
                sub={`Same ${money0(PAYMENT)} face value, ${((1 - finalReal / PAYMENT) * 100).toFixed(0)}% less purchasing power`}
              />
              <RealStat
                head={`The full ${money0(NOMINAL)} headline, in 2011 dollars`}
                value={money0(totalReal)}
                sub="What the whole stream is worth in 2011 buying power"
              />
            </div>
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================ TAB 2 ============================== */

const PRESETS = {
  pension: { lump: 250000, pmt: 18000, n: 25, defer: 1, label: "Pension buyout" },
  lottery: { lump: 1000000, pmt: 62000, n: 26, defer: 0, label: "Lottery: cash vs annuity" },
  settlement: { lump: 180000, pmt: 12000, n: 20, defer: 1, label: "Structured settlement" },
};

function OwnTab() {
  const [lump, setLump] = useState(250000);
  const [pmt, setPmt] = useState(18000);
  const [n, setN] = useState(25);
  const [defer, setDefer] = useState(1);
  const [userRate, setUserRate] = useState(0.05);

  const irr = useMemo(() => solveIRR(lump, pmt, n, defer), [lump, pmt, n, defer]);
  const pv = useMemo(() => pvStream(userRate, pmt, n, defer), [userRate, pmt, n, defer]);
  const totalNominal = pmt * n;
  const streamWins = pv >= lump;

  const applyPreset = (key) => {
    const p = PRESETS[key];
    setLump(p.lump); setPmt(p.pmt); setN(p.n); setDefer(p.defer);
  };

  return (
    <div role="tabpanel" aria-labelledby="tab-own">
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div className="rw-two">
          <Card>
            <Eyebrow>The offer on the table</Eyebrow>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 18 }}>
              {Object.keys(PRESETS).map((k) => (
                <Chip key={k} onClick={() => applyPreset(k)}>{PRESETS[k].label}</Chip>
              ))}
            </div>
            <NumField label="Lump sum offered now" prefix="$" value={lump} onChange={setLump} step={1000} />
            <NumField label="Each payment instead" prefix="$" value={pmt} onChange={setPmt} step={500} />
            <NumField label="Number of payments" value={n} onChange={setN} step={1} min={1} max={60} />
            <NumField label="Years until the first payment" value={defer} onChange={setDefer} step={1} min={0} max={40} />
            <div style={{ height: 1, background: C.line, margin: "16px 0" }} />
            <div style={{ fontSize: 14, color: C.ink, marginBottom: 6 }}>Your rate: what your money can reliably earn</div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 10 }}>
              <span style={{ fontFamily: FONT_MONO, fontSize: 30, fontWeight: 600, color: C.field }}>
                {(userRate * 100).toFixed(1)}
              </span>
              <span style={{ fontFamily: FONT_MONO, fontSize: 15, color: C.field }}>%</span>
            </div>
            <input
              className="rw-range" type="range" min={0} max={0.15} step={0.0025} value={userRate}
              onChange={(e) => setUserRate(parseFloat(e.target.value))}
              aria-label="Rate your money can reliably earn"
            />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 14 }}>
              <Chip onClick={() => setUserRate(0.04)} active={approx(userRate, 0.04)}>Cash / T-bills ~4%</Chip>
              <Chip onClick={() => setUserRate(0.044)} active={approx(userRate, 0.044)}>10-yr Treasury 4.4%</Chip>
              <Chip onClick={() => setUserRate(0.07)} active={approx(userRate, 0.07)}>Stocks, long run ~7%</Chip>
            </div>
            <p style={{ fontFamily: FONT_MONO, fontSize: 11.5, color: C.muted, lineHeight: 1.55, marginTop: 10 }}>
              Your safe rate is roughly what Treasuries pay. The Fed sets the short end, a 3.50 to 3.75 percent
              federal funds target as of June 2026, and the bond market sets the rest.
            </p>
          </Card>

          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <Card>
              <Eyebrow>The rate baked into the offer</Eyebrow>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontFamily: FONT_MONO, fontSize: 46, fontWeight: 600, color: C.ink, lineHeight: 1 }}>
                  {irr === null ? "n/a" : (irr * 100).toFixed(1)}
                </span>
                {irr !== null && <span style={{ fontFamily: FONT_MONO, fontSize: 22, color: C.muted }}>%</span>}
              </div>
              <p style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.5, marginTop: 8 }}>
                {irr === null
                  ? "These payments never add up to the lump sum, so there is no positive return in choosing them."
                  : "The return the payment stream pays you for waiting. Compare it to your own rate below."}
              </p>
            </Card>

            <Card accent={streamWins ? C.field : C.clay}>
              <Eyebrow>Your call</Eyebrow>
              {streamWins ? (
                <>
                  <div style={verdictBig(C.field)}>Take the payments</div>
                  <p style={verdictText}>
                    At your {pct1(userRate)} rate the stream is worth <b style={{ color: C.field }}>{money0(pv)}</b>,
                    which beats the {money0(lump)} lump sum by about{" "}
                    <b style={{ color: C.field }}>{money0(pv - lump)}</b>. The offer out-earns you.
                  </p>
                </>
              ) : (
                <>
                  <div style={verdictBig(C.clay)}>Take the lump sum</div>
                  <p style={verdictText}>
                    At your {pct1(userRate)} rate the stream is worth only <b style={{ color: C.clay }}>{money0(pv)}</b>,
                    short of the {money0(lump)} lump sum by about{" "}
                    <b style={{ color: C.clay }}>{money0(lump - pv)}</b>. Your money out-earns the offer.
                  </p>
                </>
              )}
            </Card>
          </div>
        </div>

        <Card pad={0}>
          <div className="rw-ledger">
            <LedgerCell label="Lump sum now" value={money0(lump)} />
            <LedgerCell label="Nominal total of payments" value={money0(totalNominal)} />
            <LedgerCell label={`Present value at ${pct1(userRate)}`} value={money0(pv)} strong last color={streamWins ? C.field : C.clay} />
          </div>
        </Card>

        <p style={{ fontFamily: FONT_MONO, fontSize: 12, color: C.muted, lineHeight: 1.7 }}>
          Works for pension buyouts, lottery cash-vs-annuity, and structured settlements. Delaying Social
          Security is the same trade: each year you wait past 62 adds roughly 8% to your check, an offer worth
          taking whenever you can beat your own rate and expect to collect long enough.
        </p>
      </div>
    </div>
  );
}

/* ============================ pieces ============================= */

function Num({ children }) {
  return <span style={{ fontFamily: FONT_MONO, fontWeight: 600 }}>{children}</span>;
}

function TabButton({ active, onClick, children, id }) {
  return (
    <button
      id={id} role="tab" aria-selected={active} onClick={onClick}
      style={{
        fontFamily: FONT_MONO, fontSize: 13, letterSpacing: "0.02em", cursor: "pointer",
        padding: "9px 15px", border: `1.5px solid ${active ? C.ink : C.line}`,
        borderRadius: 9, background: active ? C.ink : "transparent",
        color: active ? C.paper : C.muted, fontWeight: 600, transition: "all .15s",
      }}
    >
      {children}
    </button>
  );
}

function Card({ children, accent, pad = 20 }) {
  return (
    <div
      style={{
        background: C.card,
        border: `1px solid ${C.line}`,
        borderLeft: accent ? `4px solid ${accent}` : `1px solid ${C.line}`,
        borderRadius: 12, padding: pad, overflow: "hidden",
      }}
    >
      {children}
    </div>
  );
}

function Eyebrow({ children }) {
  return (
    <div
      style={{
        fontFamily: FONT_MONO, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase",
        color: C.field, fontWeight: 600, marginBottom: 12,
      }}
    >
      {children}
    </div>
  );
}

function Chip({ children, onClick, active }) {
  return (
    <button
      onClick={onClick}
      style={{
        fontFamily: FONT_MONO, fontSize: 12, cursor: "pointer", padding: "6px 11px",
        borderRadius: 20, border: `1px solid ${active ? C.field : C.line}`,
        background: active ? C.fieldSoft : "transparent",
        color: active ? C.fieldDeep : C.muted, fontWeight: 500, transition: "all .15s",
      }}
    >
      {children}
    </button>
  );
}

const verdictBig = (color) => ({
  fontFamily: FONT_DISPLAY, fontWeight: 600, fontSize: 30, lineHeight: 1.05, color, letterSpacing: "-0.01em",
});
const verdictText = { fontSize: 14.5, lineHeight: 1.5, marginTop: 8, color: C.ink };

function LedgerCell({ label, value, strong, color, last }) {
  return (
    <div style={{ padding: "16px 18px", borderRight: last ? "none" : `1px solid ${C.line}`, flex: "1 1 150px", minWidth: 150 }}>
      <div style={{ fontFamily: FONT_MONO, fontSize: 10.5, letterSpacing: "0.04em", textTransform: "uppercase", color: C.muted, marginBottom: 8, lineHeight: 1.3 }}>
        {label}
      </div>
      <div style={{ fontFamily: FONT_MONO, fontSize: strong ? 22 : 19, fontWeight: strong ? 600 : 500, color: color || C.ink }}>
        {value}
      </div>
    </div>
  );
}

function RealStat({ head, value, sub }) {
  return (
    <div style={{ background: C.brassSoft, borderRadius: 9, padding: "12px 14px" }}>
      <div style={{ fontFamily: FONT_MONO, fontSize: 11, letterSpacing: "0.03em", color: C.brass, marginBottom: 4, fontWeight: 600 }}>
        {head}
      </div>
      <div style={{ fontFamily: FONT_MONO, fontSize: 24, fontWeight: 600, color: C.ink }}>{value}</div>
      <div style={{ fontSize: 12, color: C.muted, marginTop: 2, lineHeight: 1.35 }}>{sub}</div>
    </div>
  );
}

function NumField({ label, value, onChange, prefix, step = 1, min = 0, max = 100_000_000 }) {
  return (
    <label style={{ display: "block", marginBottom: 12 }}>
      <div style={{ fontSize: 13.5, color: C.ink, marginBottom: 5 }}>{label}</div>
      <div style={{ display: "flex", alignItems: "center", border: `1.5px solid ${C.line}`, borderRadius: 8, background: "#fff", overflow: "hidden" }}>
        {prefix && (
          <span style={{ fontFamily: FONT_MONO, fontSize: 15, color: C.muted, padding: "0 4px 0 12px" }}>{prefix}</span>
        )}
        <input
          type="number" value={value} step={step} min={min} max={max}
          onChange={(e) => {
            const v = parseFloat(e.target.value);
            onChange(Number.isFinite(v) ? Math.min(max, Math.max(min, v)) : 0);
          }}
          style={{
            fontFamily: FONT_MONO, fontSize: 16, color: C.ink, border: "none", outline: "none",
            padding: prefix ? "10px 12px 10px 2px" : "10px 12px", width: "100%", background: "transparent",
          }}
        />
      </div>
    </label>
  );
}

/* helpers */
function approx(a, b) {
  return Math.abs(a - b) < 0.0013;
}

/* ---------- injected CSS (fonts + range styling + responsive) ---------- */
const styleBlock = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

.rw-two { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 16px; }
@media (max-width: 720px) { .rw-two { grid-template-columns: minmax(0,1fr); } }

.rw-ledger { display: flex; flex-wrap: wrap; }

.rw-real { display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start; }

.rw-range {
  -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
  border-radius: 6px; background: ${C.fieldSoft}; outline: none; cursor: pointer;
}
.rw-range::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: ${C.field}; border: 3px solid ${C.card}; box-shadow: 0 0 0 1.5px ${C.field}; cursor: pointer;
}
.rw-range::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%; background: ${C.field};
  border: 3px solid ${C.card}; box-shadow: 0 0 0 1.5px ${C.field}; cursor: pointer;
}
.rw-range--brass { background: ${C.brassSoft}; }
.rw-range--brass::-webkit-slider-thumb { background: ${C.brass}; box-shadow: 0 0 0 1.5px ${C.brass}; }
.rw-range--brass::-moz-range-thumb { background: ${C.brass}; box-shadow: 0 0 0 1.5px ${C.brass}; }
.rw-range:focus-visible::-webkit-slider-thumb { outline: 3px solid ${C.ink}; outline-offset: 2px; }
.rw-range:focus-visible::-moz-range-thumb { outline: 3px solid ${C.ink}; outline-offset: 2px; }

button:focus-visible { outline: 3px solid ${C.ink}; outline-offset: 2px; }
input[type=number]:focus-visible { outline: none; }

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}
`;

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
